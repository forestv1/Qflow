name: Build and Release Qflow

on:
  push:
    branches:
      - main
    tags:
      - 'v*'     
      - '[0-9]*' 
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: ''
        required: true
        default: '1.7.0'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard

      - name: Resolve Version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            ORIGINAL_VER="${{ github.ref_name }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ORIGINAL_VER="${{ github.event.inputs.version }}"
          else
            ORIGINAL_VER="1.7.0-dev"
          fi
          
          CLEAN_VER=$(echo "$ORIGINAL_VER" | sed -E 's/^[vV]//g')
          
          # 用于 Windows 的 Nuitka 属性要求，必须为纯数字 X.Y.Z 格式（去除 -dev 等后缀）
          METADATA_VER=$(echo "$CLEAN_VER" | cut -d'-' -f1)
          if [[ ! "$METADATA_VER" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            METADATA_VER="1.7.0"
          fi
          
          echo "clean_version=$CLEAN_VER" >> $GITHUB_OUTPUT
          echo "metadata_version=$METADATA_VER" >> $GITHUB_OUTPUT

      - name: Build with Nuitka
        run: |
          $version = "${{ steps.version.outputs.clean_version }}"
          $metadataVersion = "${{ steps.version.outputs.metadata_version }}"
          
          $nuitkaParams = @(
            "-m", "nuitka",
            "--standalone",
            "--onefile",
            "--windows-console-mode=disable",
            "--product-name=Qflow",
            "--product-version=$metadataVersion",
            "--file-description=Qflow Application",
            "--output-dir=dist",
            "--clean-cache=all",
            "--remove-output",
            "--noinclude-unittest-mode=nofollow",    # 已修正为 nofollow
            "--noinclude-pytest-mode=nofollow",      # 已修正为 nofollow
            "--noinclude-setuptools-mode=nofollow",  # 已修正为 nofollow
            "--assume-yes-for-downloads"
          )
          
          $pipList = pip list
          if ($pipList -match "PyQt5") { $nuitkaParams += "--enable-plugin=pyqt5" }
          if ($pipList -match "PyQt6") { $nuitkaParams += "--enable-plugin=pyqt6" }
          if ($pipList -match "PySide6") { $nuitkaParams += "--enable-plugin=pyside6" }
          
          if (Test-Path "icon.ico") {
            $nuitkaParams += "--windows-icon-from-ico=icon.ico"
            $nuitkaParams += "--include-data-files=icon.ico=."
          }
          
          $nuitkaParams += "main.py"
          
          python @nuitkaParams
          
          if (Test-Path "dist/main.exe") {
            Rename-Item -Path "dist/main.exe" -NewName "Qflow_$version.exe"
            Write-Host "成功生成：dist/Qflow_$version.exe"
          } else {
            Write-Error "编译失败：未能在 dist 目录下找到生成的 main.exe 文件"
            exit 1
          }
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Qflow-executable
          path: dist/Qflow_*.exe
          retention-days: 5

      - name: Generate changelog
        id: changelog
        run: |
          $latestCommit = git log -1 --pretty=format:"- %s (%h)"
          "changelog<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $latestCommit | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        shell: pwsh

      - name: Create Release and Upload Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Qflow ${{ steps.version.outputs.clean_version }} # Release 标题净化显示为 Qflow 1.7.0
          body: |
            ## Latest Change
            
            ${{ steps.changelog.outputs.changelog }}
            
            ---
            *此版本由 GitHub Actions 自动构建生成。*
          draft: false
          prerelease: false
          files: |
            dist/Qflow_*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
